<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>𒆜𝗞𝗔𝗜𝗥𝗘𝗡</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<div>
𒆜𝗞𝗔𝗜𝗥𝗘𝗡
</div>


<button class="admin-btn" onclick="openAdmin()">
🔐 ادمین
</button>


</header>





<!-- ورود کاربر -->

<section id="loginBox">


<h2>
👤 ورود به بازی
</h2>


<input 
id="username"
placeholder="اسم خود را وارد کنید">


<button onclick="registerUser()">
ورود
</button>


</section>







<!-- صفحه اصلی -->

<section id="home" class="hidden">


<h2>
🎮 بازی ها
</h2>



<div class="game-box" onclick="openGame()">



<img src="assets/card.png">


<h3>
🎴 4 کارت
</h3>


<p>
8 مرحله | ضریب متغیر
</p>


</div>



</section>









<!-- بازی -->

<section id="game" class="hidden">


<h2>
🎴 4 کارت
</h2>



<div class="wallet">

💰 موجودی:

<span id="balance">
0
</span>

</div>





<button onclick="goCharge()">
💳 شارژ حساب
</button>







<div class="info">


<span>
مرحله:

<b id="level">
1
</b>

/8

</span>




<span>

ضریب:

<b id="multi">
1.27
</b>

x

</span>


</div>







<div class="profit-box">


💰 مبلغ فعلی:

<b id="winAmount">
0
</b>



<br>



📈 سود:

<b id="profit">
0
</b>



</div>







<input 
id="amount"
type="number"
placeholder="مبلغ ورود">





<button onclick="startGame()">

شروع بازی

</button>








<div class="cards">


<div class="card">
🎴
</div>


<div class="card">
🎴
</div>


<div class="card">
🎴
</div>


<div class="card">
🎴
</div>


</div>







<h2 id="message"></h2>







<button onclick="cashOut()">

💰 برداشت

</button>




<button onclick="restart()">

🔄 ریست

</button>




</section>









<script type="module" src="script.js"></script>


</body>

</html>
