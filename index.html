<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>𒆜𝗞𝗔𝗜𝗥𝗘𝗡</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    𒆜𝗞𝗔𝗜𝗥𝗘𝗡
</header>

<section class="games">

<div class="game-box" onclick="openGame()">
    <img src="https://cdn-icons-png.flaticon.com/512/2910/2910768.png">
    <h3>4 کارت</h3>
</div>

</section>


<div class="game" id="game">

<h2>🎴 بازی 4 کارت</h2>

<div class="info">
    <span>مرحله: <b id="level">1</b>/8</span>
    <span>ضریب: <b id="multi">1.27</b>x</span>
</div>

<input id="money" type="number" placeholder="مبلغ ورود (حداقل 10)">

<button onclick="startGame()">شروع بازی</button>

<div class="cards" id="cards"></div>

<h2 id="result"></h2>

<button class="cash" onclick="cashOut()">برداشت پول</button>

</div>


<script src="script.js"></script>

</body>
</html>
